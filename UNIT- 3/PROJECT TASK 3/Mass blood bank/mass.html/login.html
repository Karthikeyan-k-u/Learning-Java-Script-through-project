<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Bank · Login</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- External CSS -->
    <link rel="stylesheet" href="/Mass blood bank/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-droplet"></i></div>
                <span class="logo-text">Mass Blood Bank</span>
            </div>
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to your donor account</p>

            <form action="dashboard.html" method="get">
                <div class="input-group">
                    <label for="username">Username or email</label>
                    <input type="text" id="username" name="username" placeholder="mass.doe@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="options-row">
                    <label class="checkbox">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <button type="submit" class="login-btn">Log in</button>
            </form>

            <p class="signup-text">
                Don't have an account? <a href="#">Create one</a>
            </p>
        </div>
    </div>
</body>
</html>
