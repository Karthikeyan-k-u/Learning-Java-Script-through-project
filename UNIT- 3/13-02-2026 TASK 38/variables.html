<!DOCTYPE html>
<html>
<head>
    <title>Variables</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            color: white;
            margin-top: 80px;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            margin: auto;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        button {
            padding: 10px 15px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        #output {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>JavaScript Variables</h2>

        <button onclick="showVariables()">Show Variables</button>

        <p id="output"></p>
    </div>

    <script src="variables.js"></script>

</body>
</html>
