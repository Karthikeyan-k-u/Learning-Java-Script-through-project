<!DOCTYPE html>
<html>
<head>
    <title>JS Introduction</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
            margin-top: 80px;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            margin: auto;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        button {
            padding: 10px 15px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0077ff;
        }
    </style>

    <script>
        function internalJS() {
            alert("Internal JavaScript executed!");
        }
    </script>

</head>
<body>

    <div class="card">
        <h2>JavaScript Introduction</h2>

        <button onclick="internalJS()">Internal JS</button>
        <button onclick="externalJS()">External JS</button>

        <p>Open Console (F12)</p>
    </div>

    <script src="js-intro.js"></script>

</body>
</html>
