<!DOCTYPE html>
<html>
<head>
    <title>Functions</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: white;
            width: 320px;
        }

        input {
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            width: 80%;
        }

        button {
            padding: 10px 15px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            background: #ffffff;
            color: #333;
            cursor: pointer;
        }

        button:hover {
            background: #ddd;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Functions</h2>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">

    <button onclick="calculate()">Add Numbers</button>

    <p id="output"></p>
</div>

<script src="functions.js"></script>

</body>
</html>
