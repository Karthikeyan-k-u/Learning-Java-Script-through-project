<!DOCTYPE html>
<html>
<head>
    <title>Arrow Functions</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
        }

        input {
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Arrow Functions</h2>

    <input type="number" id="num" placeholder="Enter number">

    <button onclick="calculateSquare()">Square</button>

    <p id="output"></p>
</div>

<script src="arrow-functions.js"></script>

</body>
</html>
